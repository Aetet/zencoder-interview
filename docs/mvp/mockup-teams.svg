  <text x="1012" y="842" class="table-cell">Sonnet 40%</text>

  <rect x="996" y="854" width="10" height="10" rx="2" fill="#c34513"/>
  <text x="1012" y="864" class="table-cell">Opus 15%</text>

</svg>