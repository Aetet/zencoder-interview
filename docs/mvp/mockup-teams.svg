  <!-- Donut chart center: 880, 850. Radius: 80 -->
  <!-- Haiku 45%: 0deg to 162deg -->
  <!-- Start: (880, 770) -->
  <!-- End at 162deg: (880 + 80*sin(162), 850 - 80*cos(162)) = (880 + 24.7, 850 + 76.1) = (904.7, 926.1) -->
  <!-- Sonnet 40%: 162deg to 306deg -->
  <!-- End at 306deg: (880 + 80*sin(306), 850 - 80*cos(306)) = (880 - 64.7, 850 - 47.0) = (815.3, 803.0) -->
  <!-- Opus 15%: 306deg to 360deg -->

  <!-- Haiku 45%: blue -->
  <path d="M 880 770 A 80 80 0 0 1 904.7 926.1 L 880 850 Z" fill="#3b82f6" stroke="#151513" stroke-width="2"/>

  <!-- Sonnet 40%: purple -->
  <path d="M 904.7 926.1 A 80 80 0 0 1 815.3 803.0 L 880 850 Z" fill="#8b5cf6" stroke="#151513" stroke-width="2"/>

  <!-- Opus 15%: orange -->
  <path d="M 815.3 803.0 A 80 80 0 0 1 880 770 L 880 850 Z" fill="#c34513" stroke="#151513" stroke-width="2"/>

