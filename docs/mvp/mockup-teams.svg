      .table-header { fill: #9f9e9c; font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }
      .table-cell { fill: #f6f5f3; font-size: 12px; }
      .table-cell-bold { fill: #f6f5f3; font-size: 12px; font-weight: 600; }
      .table-cell-muted { fill: #9f9e9c; font-size: 12px; }
      .table-cell-warn { fill: #ffb900; font-size: 12px; }
      .table-cell-error { fill: #d1003e; font-size: 12px; }
      .table-cell-link { fill: #fda16b; font-size: 12px; }
      .kpi-value { fill: #f6f5f3; font-size: 20px; font-weight: 700; }
      .kpi-label { fill: #9f9e9c; font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; }
      .kpi-sub { fill: #9f9e9c; font-size: 10px; }
      .filter-text { fill: #9f9e9c; font-size: 11px; }
      .filter-active { fill: #f6f5f3; font-size: 11px; font-weight: 600; }
      .tab-text { fill: #9f9e9c; font-size: 12px; cursor: pointer; }
      .tab-active { fill: #f6f5f3; font-size: 12px; font-weight: 600; }
      .chart-label { fill: #9f9e9c; font-size: 10px; }
      .chart-title { fill: #f6f5f3; font-size: 13px; font-weight: 600; }
      .divider-label { fill: #9f9e9c; font-size: 12px; font-style: italic; }
    </style>
